# config/config.yaml 主要配置

# 推送配置
notification:
  enable_notification: true
  webhooks:
    dingtalk_url: ""  # 留空，使用GitHub Secrets中的DINGTALK_WEBHOOK_URL

  # 推送模式设置
  push_mode: "incremental"  # 增量模式，适合投资者监控
  push_time_window:  # 推送时间窗口（可选）
    enabled: true
    start_time: "09:00"
    end_time: "18:00"

  # 钉钉推送格式
  dingtalk:
    msg_type: "markdown"  # 使用markdown格式，支持更丰富的展示

# AI分析配置
ai:
  enabled: true
  provider: "deepseek"  # 或 "openai"
  model: "deepseek-chat"  # 或 "gpt-4o"
  api_key: ""  # 留空，使用GitHub Secrets中的AI_API_KEY
  temperature: 0.7
  max_tokens: 2000

  # 投资分析专用提示词
  analysis_prompt: |
    你是一名专业的金融投资分析师。请根据以下热点新闻，分析相关行业的投资机会。
    
    分析要求：
    1. 识别热点新闻涉及的主要行业和概念
    2. 分析该新闻对相关行业的影响（正面/负面/中性）
    3. 推荐相关的A股、港股、美股上市公司股票代码和名称
    4. 推荐相关的ETF基金
    5. 提供简要的投资逻辑和风险提示
    
    输出格式：
    ## 📈 投资建议分析
    
    ### 🎯 热点主题
    [简要描述热点主题]
    
    ### 📊 影响分析
    - 行业影响：[分析]
    - 市场情绪：[分析]
    - 持续时间：[短期/中期/长期]
    
    ### 💰 股票推荐
    | 市场 | 代码 | 名称 | 关联度 | 简要逻辑 |
    |------|------|------|--------|----------|
    | A股 | 000001 | 平安银行 | 高 | 逻辑说明 |
    
    ### 📊 ETF推荐
    | 代码 | 名称 | 跟踪指数 | 关联度 |
    |------|------|----------|--------|
    | 510300 | 沪深300ETF | 沪深300 | 高 |
    
    ### ⚠️ 风险提示
    [风险提示内容]

# 平台配置
platforms:
  enabled: true
  sources:
    - id: "zhihu"
      name: "知乎"
    - id: "weibo"
      name: "微博"
    - id: "bilibili"
      name: "B站"
    - id: "tieba"
      name: "贴吧"
    - id: "wallstreetcn"
      name: "华尔街见闻"
    - id: "cls"
      name: "财联社"
    - id: "eastmoney"
      name: "东方财富"
    - id: "sina"
      name: "新浪财经"
    - id: "xueqiu"
      name: "雪球"
    - id: "jisilu"
      name: "集思录"

# 存储配置
storage:
  backend: "auto"  # 自动选择本地或远程存储
  retention_days: 30  # 保留30天数据