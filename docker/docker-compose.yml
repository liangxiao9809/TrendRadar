version: '3.8'

services:
  trendradar:
    image: sansan0/trendradar:latest
    container_name: trendradar
    restart: unless-stopped
    volumes:
      - ./config:/app/config
      - ./output:/app/output
      - ./custom_scripts:/app/custom_scripts
    environment:
      - DINGTALK_WEBHOOK_URL=${DINGTALK_WEBHOOK_URL}
      - AI_API_KEY=${AI_API_KEY}
      - AI_PROVIDER=${AI_PROVIDER}
      - AI_MODEL=${AI_MODEL}
      - PUSH_MODE=incremental
      - ENABLE_NOTIFICATION=true
      - CUSTOM_ANALYSIS_SCRIPT=/app/custom_scripts/custom_analysis_workflow.py
    command: >
      sh -c "python -m trendradar.crawler &&
             python /app/custom_scripts/custom_analysis_workflow.py"

  # 可选：添加定时任务容器
  cron:
    image: alpine:latest
    container_name: trendradar-cron
    restart: unless-stopped
    volumes:
      - ./docker/crontab:/etc/crontabs/root
    command: crond -f -l 8